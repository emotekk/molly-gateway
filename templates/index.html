<!DOCTYPE html>
<html>
<head>
    <title>Molly Gateway Setup</title>
    <style> 
        body { font-family: sans-serif; background: #0f111a; color: #e0e0e0; padding: 40px; display: flex; justify-content: center; }
        .container { background: #1a1c2e; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; }
        .info-card { background: #252841; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #4f46e5; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #0f111a; border: 1px solid #2d314d; border-radius: 6px; color: #fff; margin-top: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #logs { margin-top: 20px; background: #000; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 12px; height: 150px; overflow-y: auto; white-space: pre-wrap; color: #818cf8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gateway Setup</h1>
        <div class="info-card">
            <b>How it works:</b> This creates a private bridge via <a href="https://login.tailscale.com/admin/settings/keys" target="_blank" style="color:#818cf8">Tailscale</a>. Your data remains private but reachable by your phone.
        </div>
        <label>Tailscale Auth Key</label>
        <input type="password" id="key" placeholder="tskey-auth-xxxx">
        <button onclick="start()" id="btn">Deploy Gateway</button>
        <div id="logs">Ready...</div>
    </div>
    <script>
        function start() {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            fetch(`/setup?key=${document.getElementById('key').value}`).then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                function read() {
                    reader.read().then(({done, value}) => {
                        if (done) { location.reload(); return; }
                        document.getElementById('logs').innerHTML += decoder.decode(value);
                        read();
                    });
                }
                read();
            });
        }
    </script>
</body>
</html>
